layout: {zmk_keyboard: paging}
layers:
  default:
  - ESC
  - Gui+D
  - PREV
  - {t: music, h: toggle}
  - VOL UP
  - PP
  - {t: bluetooth, h: toggle}
  - VOL DN
  - NEXT
  - Gui+L
  music:
  - MUTE
  - PREV
  - {t: default, h: toggle}
  - {t: mouse, h: toggle}
  - NEXT
  - AC BACK
  - {t: default, h: toggle}
  - PP
  - AC HOME
  - PP
  mouse:
  - '&mkp LCLK'
  - '&mmv MOVE_UP'
  - {t: default, h: toggle}
  - {t: system, h: toggle}
  - '&mmv MOVE_DOWN'
  - AC BACK
  - {t: music, h: toggle}
  - '&mmv MOVE_LEFT'
  - AC HOME
  - '&mmv MOVE_RIGHT'
  system:
  - Gui+D
  - F9
  - {t: default, h: toggle}
  - {t: bluetooth, h: toggle}
  - F10
  - {t: ▽, type: trans}
  - {t: mouse, h: toggle}
  - BRI UP
  - {t: ▽, type: trans}
  - BRI DN
